version: 2
updates:
  # Backend Python dependencies (backend/requirements.txt, requirements-dev.txt)
  # `backend-all` has no update-types restriction, so major bumps join the
  # group too instead of spawning their own PR (the previous minor/patch-only
  # restriction is what caused a scheduled run to open ~20 separate PRs).
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      backend-all:
        patterns:
          - "*"

  # Frontend npm dependencies (frontend/package.json)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      frontend-all:
        patterns:
          - "*"

  # Orchestrator production image (root Dockerfile: python base + pinned lego release)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      docker-root-all:
        patterns:
          - "*"

  # Edge container image (edge/Dockerfile: tailscale/tailscale base + pinned caddy release)
  - package-ecosystem: "docker"
    directory: "/edge"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
      - "edge"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      docker-edge-all:
        patterns:
          - "*"

  # GitHub Actions workflow action versions (.github/workflows/*.yml)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions-all:
        patterns:
          - "*"
