services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    # For dev, override with uvicorn reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "${BIND_ADDR:-127.0.0.1}:8080:8080"
    volumes:
      - ./backend/app:/app/app
      - ${HOST_DATA_DIR:?Set HOST_DATA_DIR to the absolute host data directory}:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATA_DIR=/data
      - HOST_DATA_DIR=${HOST_DATA_DIR:?Set HOST_DATA_DIR to the absolute host data directory}
    labels:
      - tailbale.main=true
    restart: unless-stopped

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "${BIND_ADDR:-127.0.0.1}:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Vite dev-server /api proxy target. Inside this compose network the
      # backend is the "backend" service, not localhost. Requires vite.config.ts
      # to read VITE_PROXY_TARGET (it falls back to http://localhost:8080 for a
      # plain host-side `npm run dev`). lib/api.ts uses a relative /api base, so
      # no VITE_API_URL is needed.
      - VITE_PROXY_TARGET=http://backend:8080
    restart: unless-stopped
