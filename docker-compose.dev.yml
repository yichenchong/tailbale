services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    # For dev, override with uvicorn reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "8080:8080"
    volumes:
      - ./backend/app:/app/app
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATA_DIR=/data
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    restart: unless-stopped
